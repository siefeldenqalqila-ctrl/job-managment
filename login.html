<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>تسجيل الدخول | Nexthire</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    input:hover {
      border-color: #3b82f6 !important;
      background-color: #f8fafc;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
      outline: none;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-auto overflow-hidden transition-all duration-300">
    <div class="p-6 sm:p-8">
      <div class="text-center mb-6 sm:mb-8">
        <h2 class="text-2xl sm:text-3xl font-bold text-blue-700">تسجيل الدخول</h2>
        <p class="text-gray-500 text-sm sm:text-base mt-1">أهلاً بك مرة أخرى</p>
      </div>
      
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-gray-700 font-medium mb-2 text-sm sm:text-base">البريد الإلكتروني</label>
          <input type="email" id="email" 
                 class="w-full p-3 border border-gray-300 rounded-xl transition-all duration-200"
                 required autofocus>
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-2 text-sm sm:text-base">كلمة المرور</label>
          <input type="password" id="password" 
                 class="w-full p-3 border border-gray-300 rounded-xl transition-all duration-200"
                 required>
        </div>
        <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition transform hover:scale-[1.01]">
          دخول
        </button>
      </form>

      <div class="relative flex items-center my-6">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="flex-shrink mx-4 text-gray-400 text-sm">أو</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <div class="flex flex-col sm:flex-row gap-3">
        <button id="googleBtn" 
                class="flex-1 border border-gray-300 p-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50 transition text-gray-700">
          <i class="fab fa-google text-red-500 text-lg"></i>
          <span class="text-sm sm:text-base">Google</span>
        </button>
        <button id="facebookBtn" 
                class="flex-1 border border-gray-300 p-3 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-50 transition text-gray-700">
          <i class="fab fa-facebook text-blue-700 text-lg"></i>
          <span class="text-sm sm:text-base">Facebook</span>
        </button>
      </div>

      <p class="text-center mt-6 text-sm sm:text-base">
        ليس لديك حساب؟ 
        <a href="register.html" class="text-blue-600 font-semibold hover:underline">أنشئ حساباً</a>
      </p>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
