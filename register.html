<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>إنشاء حساب | Nexthire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    input:hover, select:hover {
      border-color: #3b82f6 !important;
      background-color: #f8fafc;
    }
    input:focus, select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
      outline: none;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center min-h-screen p-4">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-auto overflow-hidden transition-all duration-300">
    <div class="p-6 sm:p-8">
      <h2 class="text-2xl sm:text-3xl font-bold text-center text-blue-700 mb-6">حساب جديد</h2>
      
      <form id="registerForm" class="space-y-4">
        <div>
          <label class="block text-gray-700 font-medium mb-2 text-sm sm:text-base">الاسم الكامل</label>
          <input type="text" id="fullname" 
                 class="w-full p-3 border border-gray-300 rounded-xl transition-all duration-200"
                 required autofocus>
        </div>
        
        <div>
          <label class="block text-gray-700 font-medium mb-2 text-sm sm:text-base">البريد الإلكتروني</label>
          <input type="email" id="email" 
                 class="w-full p-3 border border-gray-300 rounded-xl transition-all duration-200"
                 required>
        </div>   
        
        <div>
          <label class="block text-gray-700 font-medium mb-2 text-sm sm:text-base">كلمة المرور</label>
          <input type="password" id="password" 
                 class="w-full p-3 border border-gray-300 rounded-xl transition-all duration-200"
                 required>
        </div>
        
        <div>
          <label class="block text-gray-700 font-medium mb-2 text-sm sm:text-base">تأكيد كلمة المرور</label>
          <input type="password" id="confirmPassword" 
                 class="w-full p-3 border border-gray-300 rounded-xl transition-all duration-200"
                 required>
        </div>
        
        <div>
          <label class="block text-gray-700 font-medium mb-2 text-sm sm:text-base">نوع الحساب</label>
          <select id="userType" 
                  class="w-full p-3 border border-gray-300 rounded-xl transition-all duration-200 bg-white">
            <option value="job_seeker">باحث عن عمل</option>
            <option value="company">شركة</option>
          </select>
        </div>
        
        <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition transform hover:scale-[1.01] mt-2">
          تسجيل
        </button>
      </form>
      
      <p class="text-center mt-6 text-sm sm:text-base">
        لديك حساب؟ 
        <a href="login.html" class="text-blue-600 font-semibold hover:underline">سجل الدخول</a>
      </p>
    </div>
  </div>
  
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="register.js"></script>
</body>
</html>
